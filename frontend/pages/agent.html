<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoplive Agent</title>
    <link rel="stylesheet" href="/styles/agent.css" />
  </head>
  <body>
  <script>
  (function(){
    var E=function(msg){var d=document.getElementById('__err');if(!d){d=document.createElement('div');d.id='__err';d.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;z-index:999999;padding:12px 16px;font:13px/1.5 monospace;word-break:break-all;white-space:pre-wrap;';document.body.appendChild(d);}d.textContent+=msg+'\n';};
    window.addEventListener('error',function(e){E('JS ERROR: '+e.message+'\n  at '+e.filename+':'+e.lineno);});
    window.addEventListener('unhandledrejection',function(e){E('PROMISE REJECT: '+(e.reason&&e.reason.message?e.reason.message:String(e.reason)));});
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('sendBtn');
      if(btn){btn.addEventListener('click',function(){console.log('[TEST] sendBtn click fired');},true);}
    });
  })();
  </script>
    <main class="agent-page">
      <header class="agent-topbar">
        <div class="brand">
          <img src="/assets/image.png" alt="Shoplive logo" />
          <div>
            <strong>SHOPLIVE</strong>
            <span>Agent</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="langToggleBtn" class="lang-btn">EN</button>
          <a class="back-link" href="/pages/index.html">返回首页</a>
        </div>
      </header>

      <section id="workspace" class="workspace mode-chat">
        <div class="workspace-toolbar" hidden>
          <button id="toggleScriptTab" class="workspace-tab">分镜脚本</button>
          <button id="toggleVideoTab" class="workspace-tab">视频编辑</button>
        </div>
        <aside id="scriptEditorPanel" class="editor-panel script-panel" hidden></aside>
        <section id="videoEditorPanel" class="editor-panel video-panel" hidden></section>

        <section class="chat-shell">
          <div id="chatList" class="chat-list"></div>
          <section id="taskQueuePanel" class="task-queue-panel" hidden>
            <div class="task-queue-head">
              <div id="taskQueueTitle" class="task-queue-title">并发任务</div>
              <button id="taskQueueClearBtn" class="task-queue-clear-btn" type="button">清理已完成</button>
            </div>
            <div id="taskQueueList" class="task-queue-list"></div>
          </section>

          <div class="composer composer-compact">
            <div class="compact-head">
              <button id="uploadBtn" class="ghost upload-ref-btn">参考图</button>
              <button id="toggleProductUrlBtn" class="ghost">商品链接</button>
              <button id="toggleFrameBtn" class="ghost">首尾帧</button>
              <span id="uploadHint" class="compact-hint">上传商品图后可自动识别商品信息并优化提示词。</span>
            </div>
            <div class="frame-upload-panel" id="framePanel" hidden>
              <div class="frame-slot" id="firstFrameSlot">
                <div class="frame-label">首帧</div>
                <div class="frame-drop" id="firstFrameDrop">
                  <span>+</span><span>上传首帧</span>
                </div>
                <input id="firstFrameInput" type="file" accept="image/png,image/jpeg" hidden />
              </div>
              <div class="frame-slot" id="lastFrameSlot">
                <div class="frame-label">尾帧</div>
                <div class="frame-drop" id="lastFrameDrop">
                  <span>+</span><span>上传尾帧</span>
                </div>
                <input id="lastFrameInput" type="file" accept="image/png,image/jpeg" hidden />
              </div>
              <button id="aiGenerateFramesBtn" class="ghost" type="button">AI 自动生成</button>
            </div>
            <div class="compact-link-row">
              <input id="productUrlInput" type="url" placeholder="粘贴 Shoplazza 商品链接（可自动解析）" />
              <button id="parseProductUrlBtn" class="ghost">解析链接</button>
            </div>
            <textarea id="chatInput" placeholder="输入视频生成提示词..." rows="4"></textarea>
            <div class="compact-config-row">
              <label class="compact-chip" for="aspectRatioSelect">
                <span>比例</span>
                <select id="aspectRatioSelect">
                  <option value="9:16">9:16</option>
                  <option value="16:9" selected>16:9</option>
                  <option value="1:1">1:1</option>
                </select>
              </label>
              <label class="compact-chip" for="durationSelect">
                <span>视频时长</span>
                <select id="durationSelect">
                  <option value="4">4秒</option>
                  <option value="6">6秒</option>
                  <option value="8" selected>8秒</option>
                  <option value="16">16秒</option>
                </select>
              </label>
              <button id="sendBtn">生成视频</button>
              <button id="enhancePromptBtn" class="ghost">提示词增强</button>
            </div>
            <input id="imageInput" type="file" accept="image/png,image/jpeg" multiple hidden />
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/scripts/entry/agent.main.js?v=20260309b"></script>
  </body>
</html>
